<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Galería · Viveros Unidos</title>
  <link rel="icon" type="image/png" href="../assets/images/ISOLOGOTIPOViverosUnidos.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0ece4; color: #2a1f10; min-height: 100vh; }

    /* ── Login ── */
    #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .login-card { background: #fff; border: 1.5px solid #d9cfb5; border-radius: 4px; padding: 40px; width: 100%; max-width: 380px; }
    .login-card h1 { font-family: 'Arial Black', sans-serif; font-size: 20px; color: #E61D86; margin-bottom: 4px; }
    .login-card p { color: #76664f; font-size: 13px; margin-bottom: 28px; }

    /* ── Formularios ── */
    label { display: block; font-size: 12px; font-weight: 700; color: #4a3b2a; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
    input[type=text], input[type=email], input[type=password], select {
      width: 100%; padding: 10px 12px; font-size: 14px;
      border: 1.5px solid #d9cfb5; border-radius: 4px;
      background: #fbf7ee; color: #2a1f10; outline: none; margin-bottom: 14px;
    }
    input:focus, select:focus { border-color: #E61D86; }

    /* ── Botones ── */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 10px 18px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; border-radius: 4px; transition: opacity .15s; }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .btn:hover:not(:disabled) { opacity: .85; }
    .btn-primary  { background: #E61D86; color: #fff; width: 100%; padding: 12px; font-size: 14px; }
    .btn-green    { background: #186133; color: #fff; width: 100%; padding: 12px; font-size: 14px; }
    .btn-danger   { background: #C72525; color: #fff; padding: 6px 12px; font-size: 12px; }
    .btn-outline  { background: transparent; color: #76664f; border: 1.5px solid #d9cfb5; padding: 7px 14px; font-size: 13px; }

    /* ── Admin shell ── */
    #adminPanel { display: none; }
    .admin-header {
      background: #fff; border-bottom: 1.5px solid #d9cfb5;
      padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10;
    }
    .admin-header h1 { font-size: 16px; font-weight: 700; }
    .admin-header small { font-size: 11px; color: #76664f; display: block; }
    .admin-body { max-width: 820px; margin: 0 auto; padding: 28px 20px; }

    /* ── Cards ── */
    .card { background: #fff; border: 1.5px solid #d9cfb5; border-radius: 4px; padding: 24px; margin-bottom: 24px; }
    .card h2 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: #76664f; border-bottom: 1.5px solid #ece3cc; padding-bottom: 10px; margin-bottom: 20px; }

    /* ── Dropzone ── */
    .dropzone {
      border: 2px dashed #d9cfb5; border-radius: 4px; padding: 28px 16px;
      text-align: center; cursor: pointer; background: #fbf7ee;
      margin-bottom: 16px; transition: border-color .15s, background .15s;
    }
    .dropzone:hover, .dropzone.drag-over { border-color: #E61D86; background: #fdf0f7; }
    .dropzone p { font-size: 14px; color: #76664f; pointer-events: none; }
    .dropzone .chosen { color: #186133; font-weight: 700; font-size: 13px; margin-top: 6px; }
    .dropzone input[type=file] { display: none; }

    /* ── Preview arrastrable ── */
    .preview-wrap { display: none; margin-bottom: 16px; }
    .preview-frame {
      width: 100%; max-width: 370px; height: 260px; overflow: hidden; position: relative;
      border-radius: 4px; border: 1.5px solid #d9cfb5; background: #e8e0d0;
      cursor: grab; user-select: none;
    }
    .preview-frame.dragging { cursor: grabbing; }
    .preview-frame img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; pointer-events: none; user-select: none; draggable: false;
    }
    .preview-badge {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.52); color: #fff; font-size: 11px; font-weight: 600;
      padding: 3px 12px; border-radius: 99px; pointer-events: none; white-space: nowrap;
      letter-spacing: .03em;
    }
    .preview-meta {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 6px; font-size: 12px; color: #76664f;
    }
    .preview-meta button {
      background: none; border: none; cursor: pointer; font-size: 12px;
      color: #E61D86; font-weight: 700; padding: 0; text-decoration: underline;
    }

    /* ── Form grid ── */
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 560px) { .form-row { grid-template-columns: 1fr; } }

    /* ── Mensajes ── */
    .msg { padding: 10px 14px; border-radius: 4px; font-size: 13px; margin-bottom: 14px; display: none; }
    .msg-ok  { background: #dce9cc; color: #0f3f22; display: block; }
    .msg-err { background: #fde8e8; color: #c72525; display: block; }

    /* ── Lista de ítems ── */
    .items-list { display: flex; flex-direction: column; gap: 8px; }
    .item-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border: 1px solid #ece3cc; border-radius: 4px; background: #fbf7ee;
    }
    .item-row img { width: 64px; height: 52px; object-fit: cover; border-radius: 3px; flex-shrink: 0; border: 1px solid #d9cfb5; }
    .item-info { flex: 1; min-width: 0; }
    .item-info strong { display: block; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 99px; background: #dce9cc; color: #0f3f22; margin-top: 3px; }
    .badge.produccion { background: #fdf0e0; color: #7a4a00; }
    .badge.capacitaciones { background: #dde8fb; color: #003a7a; }
    .badge.eventos { background: #fbd8ea; color: #860050; }

    .gallery-empty-msg { text-align: center; padding: 28px; color: #76664f; font-size: 14px; }

    /* ── Spinner ── */
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.35); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- ── LOGIN ── -->
  <div id="loginScreen">
    <div class="login-card">
      <h1>Viveros Unidos</h1>
      <p>Panel de administración · Galería</p>
      <div id="loginMsg" class="msg"></div>
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" placeholder="admin@ejemplo.com" autocomplete="username">
      <label for="loginPass">Contraseña</label>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
      <button class="btn btn-primary" id="loginBtn">Ingresar</button>
    </div>
  </div>

  <!-- ── ADMIN ── -->
  <div id="adminPanel">
    <header class="admin-header">
      <div>
        <h1>Galería · Admin</h1>
        <small id="userEmail"></small>
      </div>
      <button class="btn btn-outline" id="logoutBtn">Cerrar sesión</button>
    </header>

    <div class="admin-body">

      <!-- Upload -->
      <div class="card">
        <h2>Subir nueva imagen</h2>
        <div id="uploadMsg" class="msg"></div>
        <div class="dropzone" id="dropzone">
          <input type="file" id="fileInput" accept="image/*">
          <p>Hacé clic o arrastrá una imagen acá</p>
          <div class="chosen" id="fileName"></div>
        </div>
        <div class="preview-wrap" id="previewWrap">
          <div class="preview-frame" id="previewFrame">
            <img id="previewImg" alt="Vista previa" draggable="false">
            <div class="preview-badge">Arrastrá para encuadrar</div>
          </div>
          <div class="preview-meta">
            <span id="posLabel">Posición: 50% · 50%</span>
            <button type="button" id="resetPos">Centrar</button>
          </div>
        </div>
        <div class="form-row">
          <div>
            <label for="imgTitle">Título</label>
            <input type="text" id="imgTitle" placeholder="Ej: Invernadero principal">
          </div>
          <div>
            <label for="imgCategory">Categoría</label>
            <select id="imgCategory">
              <option value="vivero">Vivero</option>
              <option value="produccion">Producción</option>
              <option value="capacitaciones">Capacitaciones</option>
              <option value="eventos">Eventos</option>
            </select>
          </div>
        </div>
        <button class="btn btn-green" id="uploadBtn">Subir imagen</button>
      </div>

      <!-- Items -->
      <div class="card">
        <h2 id="itemsHeading">Imágenes en galería</h2>
        <div id="itemsList">
          <p class="gallery-empty-msg">Cargando…</p>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./admin.js"></script>
</body>
</html>
